# Dependabot — keeps dependencies patched and surfaces vulnerable packages as PRs.
# Runs on GitHub independently of CI runners (no self-hosted CI required).
# Note: this config only drives *version* updates once merged to the default
# branch. Dependabot *security* alerts + updates must also be enabled in
# repo Settings → Code security and analysis (owner action).
version: 2
updates:
  # ---- Backend (.NET / NuGet) ----
  - package-ecosystem: "nuget"
    directory: "/backend/Ares.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  # ---- Frontend (npm) ----
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]

  # ---- Container base images ----
  - package-ecosystem: "docker"
    directory: "/backend/Ares.Api"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]

  # ---- GitHub Actions (no workflows yet; future-proof if CI is added) ----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
