server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — client-side view switching is in-app, but deep links / refresh
  # should still land on index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the ASP.NET Core container so the SPA and API share origin.
  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location = /health {
    proxy_pass http://api:8080/health;
  }

  # Cache static assets aggressively; index.html stays fresh.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
